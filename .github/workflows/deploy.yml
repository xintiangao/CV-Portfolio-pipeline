name: Auto Update Portfolio

on:
  schedule:
    - cron: "0 4 * * *" # Runs automatically every day at 04:00 UTC
  workflow_dispatch: # Enables manual trigger button inside GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4.2.2 # Bumped to completely support the modern runtime environment

      - name: Set up Python Environment
        uses: actions/setup-python@v5.4.0 # Bumped to quiet deprecation alerts
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System Dependencies
        run: |
          pip install google-api-python-client google-auth
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Automation Pipeline (Fetch & Parse CV)
        env:
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python pipeline.py

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
