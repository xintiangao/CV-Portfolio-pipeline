name: Auto Update Portfolio

on:
  schedule:
    - cron: '0 4 * * *' 
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        pip install google-api-python-client google-auth
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Uncomment below if your custom script needs Playwright
        # pip install playwright
        # playwright install chromium

    - name: Run Automation Pipeline (Fetch & Parse CV)
      env:
        GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
        GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: |
        python pipeline.py

    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod' # Forces a production deployment