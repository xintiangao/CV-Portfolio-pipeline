name: Auto Update Portfolio

on:
  schedule:
    - cron: '0 4 * * *' 
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4.2.2
      with:
        token: ${{ secrets.GITHUB_TOKEN }} 

    - name: Set up Python Environment
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        pip install google-api-python-client google-auth
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Automation Pipeline (Fetch & Parse CV)
      env:
        GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
        GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: |
        python pipeline.py

    - name: Commit and Push Updated Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Check if data.js actually changed, and if so, commit and push it
        git add data/js/data.js || git add data.js
        if ! git diff --cached --quiet; then
          git commit -m "chore: automated sync of latest cv data parameters [skip ci]"
          git push origin main
        else
          echo "No changes detected in CV data. Skipping commit."
        fi